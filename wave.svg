<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A97BFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A97BFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes flowingWave {
      0% { transform: translateY(0px) translateX(0px); }
      25% { transform: translateY(5px) translateX(5px); }
      50% { transform: translateY(0px) translateX(10px); }
      75% { transform: translateY(-5px) translateX(5px); }
      100% { transform: translateY(0px) translateX(0px); }
    }
    .line { 
      font-family: monospace; 
      font-size: 16px; 
      font-weight: bold;
      fill: url(#waveGradient); 
      animation: flowingWave 4s ease-in-out infinite;
    }
    /* Staggered delay creates the "Wave" ripple effect */
    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.3s; }
    .l3 { animation-delay: 0.5s; }
    .l4 { animation-delay: 0.7s; }
    .l5 { animation-delay: 0.9s; }
    .l6 { animation-delay: 1.1s; }
  </style>
  <text class="line l1" x="50" y="40">⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣀⣤⣤⣤⣀⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀</text>
  <text class="line l2" x="50" y="60">⠀⠀⠀⠀⠀⠀⠀⠀⣰⠟⠉⠀⠀⠉⠙⠻⣶⣄⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀</text>
  <text class="line l3" x="50" y="80">⠀⠀⠀⠀⠀⠀⠀⠀⢏⠀⠈⠉⠲⣄⠀⠀⠈⢻⣦⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀</text>
  <text class="line l4" x="50" y="100">⠀⠀⠀⠀⠀⠀⠀⠀⠈⠂⠀⠀⠀⢹⡇⠀⠀⠀⠹⣷⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀</text>
  <text class="line l5" x="50" y="120">⠀⠀⠀⠀⣀⣠⣤⣀⣀⣀⣀⣀⣠⣿⠃⠀⠀⠀⠀⠈⠻⣦⣀⠀⠀⠀⠀⠀⠀⠀</text>
  <text class="line l6" x="50" y="140">⠀⠀⠀⠀⠀⠀⠀⠈⠉⠛⠛⠛⠉⠀⠀⠀⠀⠀⠀⠀⠀⠀⠉⠉⠒⠒⠀</text>
</svg>
